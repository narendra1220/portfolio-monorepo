version: "3.9"

# Single source of truth for local infra: data stores + observability stack.
# App services (portfolio, job-queue worker, etc.) are defined in their own
# folders' compose files and use the `portfolio` network defined here.

networks:
  portfolio:
    name: portfolio
    driver: bridge

volumes:
  redis-data:
  mongo-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:

services:
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [portfolio]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: portfolio
      MONGO_INITDB_ROOT_PASSWORD: change-me-locally
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks: [portfolio]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: portfolio-clickhouse
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks: [portfolio]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: portfolio-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter
    networks: [portfolio]
    depends_on: [clickhouse]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: portfolio-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [portfolio]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: portfolio-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks: [portfolio]
    depends_on: [prometheus]

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
    networks: [portfolio]
